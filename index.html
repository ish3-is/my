    const ParticleBackground = () => {
        const canvasRef = useRef(null);
        useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationId, particles = [];
            const particleCount = 70;
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            };
            const initParticles = () => {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 1,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2, alpha: Math.random() * 0.5 + 0.2
                    });
                }
            };
            const draw = () => {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(139, 92, 246, ${p.alpha * 0.5})`;
                    ctx.fill();
                    for (let other of particles) {
                        const dx = p.x - other.x, dy = p.y - other.y, dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 100 && dist > 0) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(other.x, other.y);
                            ctx.strokeStyle = `rgba(168, 85, 247, ${0.08 * (1 - dist/150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                for (let p of particles) { p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; }
                animationId = requestAnimationFrame(draw);
            };
            window.addEventListener('resize', resize);
            resize();
            draw();
            return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationId); };
        }, []);
        return <canvas ref={canvasRef} id="particle-canvas" style={{position:'fixed', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:0}} />;
    };

            }, { threshold: 0.2, rootMargin: "0px 0px -40px 0px" });
            elements.forEach(el => observer.observe(el));
            return () => observer.disconnect();
        }, []);

                                <button onClick={() => scrollToSection('contact')} className="px-8 py-3 rounded-full border border-purple-400/60 text-white font-semibold backdrop-blur-sm hover:bg-white/10 transition-all hover:scale-105 flex items-center gap-2"><i className="fas fa-envelope"></i> {t.hero.btn2}</button>
                            </div>
                        </div>
                    </section>
                    
                    {/* About Me */}
                    <FadeInSection className="mb-32">
                        <div className="glass-card p-8 md:p-12 rounded-3xl">

                            <p className="text-gray-200 text-lg leading-relaxed">{t.aboutMe.desc}</p>

                    {/* Organization Section - Large & Prominent */}

                                    <div className="bg-white/10 rounded-2xl p-5">

                                        <p>{t.organization.mission}</p>
                                    </div>
                                </div>
                                <div className="mt-6 flex flex-wrap gap-3 justify-center">
                                    {t.organization.values.map((val, i) => (
                                        <span key={i} className="bg-purple-500/30 rounded-full px-4 py-2 text-sm"><i className="fas fa-star text-yellow-400 ml-1"></i> {val}</span>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </FadeInSection>
                    
                    {/* Graduation Project + Team */}
                    <FadeInSection className="mb-32" id="project">
                        <div className="glass-card p-8 md:p-12 rounded-3xl bg-gradient-to-br from-indigo-900/30 to-purple-900/30">

                                <i className="fas fa-project-diagram text-5xl text-purple-400 mb-3"></i>
                                <h2 className="text-3xl md:text-4xl font-bold">{t.project.title}</h2>
                                <p className="text-gray-200 text-lg max-w-3xl mx-auto mt-4">{t.project.desc}</p>
                            </div>
                            <h3 className="text-2xl font-bold mb-6 text-center border-b border-purple-500 inline-block w-full pb-2">{t.project.teamTitle}</h3>

                                    <div key={idx} className="bg-white/5 backdrop-blur-sm rounded-2xl p-5 text-center transition-all duration-300 hover:bg-white/10 hover:-translate-y-2 hover:shadow-xl border border-white/10">

                                        <h3 className="text-lg font-bold text-white">{member.name}</h3>
                                        <p className="text-purple-300 text-xs mb-1">{member.role}</p>
                                        <p className="text-gray-300 text-sm">{member.desc}</p>
                                        <div className="flex justify-center gap-3 mt-3">
                                            {member.linkedin && <a href={member.linkedin} target="_blank" className="text-gray-400 hover:text-purple-400 transition social-icon"><i className="fab fa-linkedin-in"></i></a>}
                                            {member.twitter && <a href={member.twitter} target="_blank" className="text-gray-400 hover:text-purple-400 transition social-icon"><i className="fab fa-x-twitter"></i></a>}
                                            {member.tiktok && <a href={member.tiktok} target="_blank" className="text-gray-400 hover:text-purple-400 transition social-icon"><i className="fab fa-tiktok"></i></a>}
                                            {member.youtube && <a href={member.youtube} target="_blank" className="text-gray-400 hover:text-purple-400 transition social-icon"><i className="fab fa-youtube"></i></a>}
                                            {member.telegram && <a href={member.telegram} target="_blank" className="text-gray-400 hover:text-purple-400 transition social-icon"><i className="fab fa-telegram-plane"></i></a>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </FadeInSection>
                    
                    {/* Services Section (Personal) with Channels integrated */}

                                <div className="flex items-center gap-3 mb-4"><i className="fas fa-chalkboard-user text-2xl text-purple-400"></i><span className="text-xl font-semibold">{t.personalServices.contentCreator}</span></div>
                                <div className="flex items-center gap-3 mb-4"><i className="fas fa-chart-line text-2xl text-purple-400"></i><span className="text-xl font-semibold">{t.personalServices.leadership}</span></div>

                                        ))}
                                    </ul>
                                </div>
                                <div className="mt-6 pt-4 border-t border-white/20">
                                    <div className="flex items-center gap-3 mb-3"><i className="fas fa-graduation-cap text-2xl text-purple-400"></i><h3 className="text-xl font-bold">{t.personalServices.mastersExperience}</h3></div>
                                    <p className="text-gray-200 leading-relaxed">{t.personalServices.mastersDesc}</p>
                                </div>
                            </div>
                            <div className="glass-card p-6">
                                <h3 className="text-xl font-bold mb-4"><i className="fas fa-certificate text-purple-400 ml-2"></i> {t.personalServices.certificatesTitle}</h3>

                                    {certificates.map((cert, idx) => (
                                        <div key={idx} className="bg-white/5 rounded-xl p-3 border border-white/10 hover:bg-purple-500/20 transition cert-badge">
                                            <div className="flex justify-between items-start">
                                                <div><p className="font-bold text-sm">{cert.name}</p><p className="text-xs text-gray-400">{cert.org} | {cert.date}</p></div>
                                                <span className="text-green-400 text-xs bg-green-900/30 px-2 py-1 rounded-full">{cert.status}</span>
                                            </div>
                                            <button className="text-purple-300 text-xs mt-2 hover:text-purple-100 transition"><i className="fas fa-eye ml-1"></i> {t.personalServices.viewCert}</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        {/* Channels Section - Now inside Services */}
                        <div className="mt-10">
                            <h3 className="text-2xl font-bold mb-6 text-center"><i className="fas fa-link text-purple-400 ml-2"></i> {t.personalServices.channelsTitle}</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {founderChannels.map((channel, idx) => (
                                    <a key={idx} href={channel.url} target="_blank" rel="noopener noreferrer" className="channel-link-card flex items-center gap-3 bg-white/5 rounded-xl p-4 border border-white/10 transition">
                                        <i className={`${channel.icon} text-3xl text-purple-400`}></i>
                                        <div><p className="font-bold text-lg">{channel.name}</p><p className="text-xs text-gray-400">{channel.platform}</p></div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </FadeInSection>
                    
                    {/* Training Fields */}
                    <FadeInSection className="mb-32" id="training">
                        <h2 className="text-3xl md:text-4xl font-bold mb-12 text-right border-r-4 border-purple-500 pr-5">مجالات التدريب</h2>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                            {t.trainingFields.map((f,i)=>(
                                <div key={i} className="group relative overflow-hidden rounded-2xl bg-gradient-to-br from-gray-900/60 to-purple-900/30 backdrop-blur-sm p-6 text-center border border-white/10 hover:border-purple-400/50 transition-all hover:-translate-y-2">
                                    <i className="fas fa-microchip text-3xl text-purple-400 mb-3 block"></i>
                                    <span className="text-lg font-semibold">{f}</span>
                                </div>
                            ))}
                        </div>
                    </FadeInSection>
                    
                    {/* Why Choose Us */}
                    <FadeInSection className="mb-32" id="why">
                        <h2 className="text-3xl md:text-4xl font-bold mb-12 text-right border-r-4 border-purple-500 pr-5">لماذا منظمة مدار التقنية؟</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-7">
                            {t.whyItems.map((item,i)=>(
                                <div key={i} className="flex items-start gap-4 glass-card p-5">
                                    <div className="text-3xl text-purple-400"><i className="fas fa-check-circle"></i></div>
                                    <div><h3 className="text-xl font-bold mb-1">{item.title}</h3><p className="text-gray-300 text-sm">{item.desc}</p></div>
                                </div>
                            ))}
                        </div>
                    </FadeInSection>
                    
                    {/* Contact */}
                    <FadeInSection className="mb-24" id="contact">
                        <div className="glass-card p-8 md:p-12 rounded-3xl">
                            <h2 className="text-3xl md:text-4xl font-bold mb-8 text-right border-r-4 border-purple-500 pr-5">{t.contact.title}</h2>
                            <div className="grid md:grid-cols-2 gap-10">
                                <div>
                                    <form className="space-y-5" onSubmit={(e)=>{e.preventDefault(); alert("تم إرسال رسالتك! سأتواصل معك قريباً."); e.target.reset();}}>
                                        <input type="text" placeholder="الاسم الكامل" className="w-full p-3 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none"/>
                                        <input type="email" placeholder="البريد الإلكتروني" className="w-full p-3 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none"/>
                                        <textarea rows="3" placeholder="رسالتك..." className="w-full p-3 rounded-xl bg-white/5 border border-white/10 focus:border-purple-500 outline-none"></textarea>
                                        <button className="w-full py-3 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl font-bold">{t.contact.btn}</button>
                                    </form>
                                    <div className="flex gap-5 mt-8 justify-center">
                                        <a href="https://t.me/mesh_al" target="_blank" className="bg-sky-500/30 p-3 rounded-full hover:bg-sky-500"><i className="fab fa-telegram-plane text-xl"></i></a>
                                        <a href="http://www.youtube.com/@sh3_IS" target="_blank" className="bg-red-600/30 p-3 rounded-full hover:bg-red-600"><i className="fab fa-youtube text-xl"></i></a>
                                        <a href="https://linkedin.com/in/mesh-al-jathmi" target="_blank" className="bg-blue-600/30 p-3 rounded-full hover:bg-blue-600"><i className="fab fa-linkedin-in text-xl"></i></a>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-5 justify-center bg-white/5 p-6 rounded-2xl">
                                    <div className="flex items-center gap-4"><i className="fas fa-map-marker-alt text-purple-400 text-2xl"></i><span>خميس مشيط، المملكة العربية السعودية</span></div>
                                    <div className="flex items-center gap-4"><i className="fas fa-envelope text-purple-400 text-2xl"></i><span>edubridge.tech@gmail.com</span></div>
                                    <div className="flex items-center gap-4"><i className="fas fa-phone-alt text-purple-400 text-2xl"></i><span>+966 0000 0000</span></div>
                                </div>
                            </div>
                        </div>
                    </FadeInSection>
                    
                    <footer className="pt-12 pb-8 border-t border-white/10 text-center">
                        <div className="flex justify-center gap-8 mb-6">
                            <a href="https://t.me/mdr_Tech" target="_blank" className="text-gray-400 hover:text-purple-400 text-2xl"><i className="fab fa-telegram"></i></a>
                            <a href="http://www.youtube.com/@sh3_IS" target="_blank" className="text-gray-400 hover:text-purple-400 text-2xl"><i className="fab fa-youtube"></i></a>
                        </div>
                        <p className="text-gray-400 text-sm">© 2025 {t.footer}</p>
                    </footer>
                </main>
            </>
        );
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
