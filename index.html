    const ParticleBackground = () => {
        const canvasRef = useRef(null);
        useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let animationId, particles = [];
            const particleCount = 70;
            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            };
            const initParticles = () => {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 1,
                        vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2, alpha: Math.random() * 0.5 + 0.2
                    });
                }
            };
            const draw = () => {
                if (!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(139, 92, 246, ${p.alpha * 0.5})`;
                    ctx.fill();
                    for (let other of particles) {
                        const dx = p.x - other.x, dy = p.y - other.y, dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 100 && dist > 0) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(other.x, other.y);
                            ctx.strokeStyle = `rgba(168, 85, 247, ${0.08 * (1 - dist/150)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                for (let p of particles) { p.x += p.vx; p.y += p.vy; if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0; if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0; }
                animationId = requestAnimationFrame(draw);
            };
            window.addEventListener('resize', resize);
            resize();
            draw();
            return () => { window.removeEventListener('resize', resize); cancelAnimationFrame(animationId); };
        }, []);
        return <canvas ref={canvasRef} id="particle-canvas" style={{position:'fixed', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none', zIndex:0}} />;
    };

            }, { threshold: 0.2, rootMargin: "0px 0px -40px 0px" });
            elements.forEach(el => observer.observe(el));
            return () => observer.disconnect();
        }, []);
    };
